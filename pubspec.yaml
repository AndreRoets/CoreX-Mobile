name: corex_mobile
description: CoreX OS - Home Finders Coastal mobile app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  http: ^1.2.2
  shared_preferences: ^2.3.3
  google_fonts: ^6.2.1
  flutter_dotenv: ^6.0.0
  image_picker: ^1.0.0
  camera: ^0.11.0+2
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/corex_logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: "#0D0F14"
  adaptive_icon_background: "#0D0F14"
  adaptive_icon_foreground: "assets/images/corex_logo.png"
  adaptive_icon_monochrome: "assets/images/corex_logo.png"
  windows:
    generate: true
    image_path: "assets/images/corex_logo.png"
    icon_size: 48

flutter_native_splash:
  color: "#0D0F14"
  image: assets/images/corex_logo.png
  color_dark: "#0D0F14"
  image_dark: assets/images/corex_logo.png
  android_12:
    image: assets/images/corex_logo.png
    color: "#0D0F14"
    image_dark: assets/images/corex_logo.png
    color_dark: "#0D0F14"
  android: true
  ios: true
  web: false
